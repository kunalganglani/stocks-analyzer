name: daily-screen

on:
  schedule:
    - cron: "30 22 * * 1-5" # 22:30 UTC weekdays, after US market close
  workflow_dispatch:
    inputs:
      tickers:
        description: "Optional comma list of tickers (default: quality universe)"
        required: false

concurrency:
  group: screener
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: screener
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Cache price parquet
        uses: actions/cache@v4
        with:
          path: screener/.cache
          key: prices-${{ github.run_id }}
          restore-keys: prices-
      - run: uv sync --frozen --no-dev
      - name: Run daily screen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM: ${{ vars.ALERT_FROM || 'stocks-analyzer <onboarding@resend.dev>' }}
          ALERT_TO: ${{ vars.ALERT_TO || 'kunalganglani@gmail.com' }}
        run: |
          EXTRA=""
          if [ -n "${{ inputs.tickers }}" ]; then EXTRA="--tickers ${{ inputs.tickers }}"; fi
          uv run python -m screener.jobs.run_daily $EXTRA
