# Screener batch job — triggered by Cloud Scheduler (daily/weekly) or the
# dashboard's "Run now" button, via `gcloud builds triggers run` / REST.
#
# Secrets: single .env blob in Secret Manager secret `stocks-analyzer-env`
# (same pattern as the Ahoya blog agent):
#   SUPABASE_URL=... SUPABASE_SERVICE_KEY=... RESEND_API_KEY=...
#   ALERT_FROM=... ALERT_TO=...
#
# Substitution _MODE: daily (default) | weekly

substitutions:
  _MODE: "daily"

steps:
  - id: screener
    name: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    dir: screener
    entrypoint: bash
    secretEnv: ["SCREENER_ENV"]
    args:
      - -c
      - |
        set -euo pipefail
        printf '%s\n' "$$SCREENER_ENV" > /tmp/screener.env
        set -a; . /tmp/screener.env; set +a
        uv sync --frozen --no-dev
        if [ "${_MODE}" = "weekly" ]; then
          uv run python -m screener.jobs.run_weekly
        else
          uv run python -m screener.jobs.run_daily
        fi

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/stocks-analyzer-env/versions/latest
      env: SCREENER_ENV

options:
  logging: CLOUD_LOGGING_ONLY

# weekly full-universe run can take a while; daily finishes in minutes
timeout: 10800s
